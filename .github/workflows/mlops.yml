name: MLOps Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow_test.db
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa-key.json" >> $GITHUB_ENV
      - name: Pull data with DVC
        run: |
          dvc remote modify myremote credentialpath sa-key.json
          dvc pull
      - name: Train model
        run: |
          export MLFLOW_TRACKING_URI=sqlite:///mlflow.db
          python src/train.py
      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
      - name: Upload model to GCS
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          client = storage.Client()
          bucket = client.bucket('${{ secrets.CLOUD_BUCKET }}')
          blob = bucket.blob('models/latest/model.pkl')
          blob.upload_from_filename('models/model.pkl')
          print("Model uploaded to GCS")
          EOF
      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python -c "acc = float('${{ needs.train.outputs.accuracy }}'); print(f'Accuracy: {acc}'); exit(0 if acc >= 0.70 else 1)"

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo apt update && sudo apt install -y python3-pip
            pip3 install fastapi uvicorn scikit-learn joblib google.cloud-storage
            mkdir -p ~/models ~/src
            echo '${{ secrets.CLOUD_CREDENTIALS }}' > ~/sa-key.json
            sudo tee /etc/systemd/system/mlops-serve.service > /dev/null <<EOF
            [Unit]
            After=network.target
            [Service]
            User=${{ secrets.VM_USER }}
            WorkingDirectory=/home/${{ secrets.VM_USER }}
            Environment="GCS_BUCKET=${{ secrets.CLOUD_BUCKET }}"
            Environment="GOOGLE_APPLICATION_CREDENTIALS=/home/${{ secrets.VM_USER }}/sa-key.json"
            Environment="DEPLOYMENT_ENV=production"
            ExecStart=/usr/bin/python3 /home/${{ secrets.VM_USER }}/src/serve.py
            Restart=always
            [Install]
            WantedBy=multi-user.target
            EOF
            sudo systemctl daemon-reload
            sudo systemctl enable mlops-serve
      - name: Upload serve.py
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "src/serve.py"
          target: "/home/${{ secrets.VM_USER }}/"
      - name: Finalize Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 10
            curl -f http://localhost:8000/health || (sudo journalctl -u mlops-serve -n 50 && exit 1)
